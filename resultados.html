<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultados - SO Lab Challenge - SEMANA 11</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

h2{
    margin-top:20px;
}

button{
    padding:10px 20px;
    margin:15px;
    border:none;
    background:#dc3545;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#a71d2a;
}

table{
    margin:20px auto;
    border-collapse: collapse;
    width: 80%;
    background:white;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

th, td{
    padding:10px;
    border:1px solid #ddd;
}

th{
    background:#007BFF;
    color:white;
}

.aprobado{
    color:green;
    font-weight:bold;
}

.reprobado{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Resultados de alumnos semana-11</h2>

<button onclick="borrarResultados()">🗑 Borrar todos los resultados de la semana </button>

<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Grupo</th>
            <th>Calificación</th>
            <th>Estado</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>

<script>

const tabla = document.getElementById("tabla");

// ✅ CARGAR RESULTADOS DESDE LOCALSTORAGE
let resultados = JSON.parse(localStorage.getItem("resultados")) || [];

resultados.forEach(data => {

    let estado = data.puntaje >= 90 
        ? "<span class='aprobado'>✔ Aprobado</span>"
        : "<span class='reprobado'>✘ Reprobado</span>";

    tabla.innerHTML += `
        <tr>
            <td>${data.nombre}</td>
            <td>${data.grupo}</td>
            <td>${data.puntaje}%</td>
            <td>${estado}</td>
            <td>${data.fecha}</td>
        </tr>
    `;
});

// 🗑 BORRAR RESULTADOS
function borrarResultados(){

    if(confirm("⚠️ ¿Seguro que deseas borrar TODOS los resultados?")){
        localStorage.removeItem("resultados");
        location.reload();
    }

}

</script>

</body>
</html>
